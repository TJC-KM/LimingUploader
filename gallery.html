<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黎明寶庫</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
  .container { max-width: 960px; margin: 0 auto; padding: 16px; }

  /* Header */
  .gallery-header { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #eee; gap: 10px; }
  .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .page-title { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .folder-name-span { color: #378ADD; }
  .btn-back { padding: 6px 12px; background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .btn-back:hover { background: #eee; }
  .btn-copy-link { padding: 7px 14px; background: #378ADD; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .btn-copy-link:hover { background: #2d72c0; }
  .btn-copy-link.copied { background: #3B6D11; }

  /* Section labels */
  .section-label { font-size: 12px; color: #aaa; padding: 14px 0 6px; }

  /* Folder grid */
  .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  @media (max-width: 480px) { .folder-grid { grid-template-columns: repeat(2, 1fr); } }
  .folder-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
  .folder-card:hover { border-color: #378ADD; box-shadow: 0 2px 8px rgba(55,138,221,0.1); }
  .folder-card .fc-icon { font-size: 22px; margin-bottom: 6px; }
  .folder-card .fc-name { font-size: 13px; font-weight: 500; word-break: break-word; line-height: 1.3; }

  /* Media grid */
  .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  @media (max-width: 480px) { .media-grid { grid-template-columns: repeat(3, 1fr); } }
  .media-card { border-radius: 8px; overflow: hidden; border: 1px solid #eee; cursor: pointer; transition: box-shadow 0.15s; background: #e8e8e8; position: relative; }
  .media-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.15); border-color: #bbb; }
  .media-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .media-label { font-size: 11px; color: #555; padding: 4px 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: #fff; }
  .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .play-icon::after { content: '▶'; font-size: 28px; color: rgba(255,255,255,0.9); text-shadow: 0 2px 6px rgba(0,0,0,0.5); }

  /* Doc list */
  .doc-section { background: #fff; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
  .doc-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #f5f5f5; }
  .doc-row:last-child { border-bottom: none; }
  .doc-icon { font-size: 18px; flex-shrink: 0; }
  .doc-info { flex: 1; min-width: 0; }
  .doc-name { font-size: 13px; font-weight: 500; word-break: break-word; }
  .doc-meta { font-size: 11px; color: #888; margin-top: 2px; }
  .doc-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-action { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid #ddd; color: #378ADD; text-decoration: none; white-space: nowrap; background: none; cursor: pointer; }
  .btn-action:hover { background: #f0f7ff; border-color: #378ADD; }

  /* Lightbox */
  .lb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 100; align-items: center; justify-content: center; }
  .lb-overlay.show { display: flex; }
  .lb-img { max-width: 92vw; max-height: 88vh; object-fit: contain; border-radius: 4px; display: block; user-select: none; }
  .lb-close { position: absolute; top: 14px; right: 18px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; line-height: 1; padding: 6px; z-index: 101; }
  .lb-close:hover { color: #ccc; }
  .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.12); border: none; color: #fff; font-size: 34px; cursor: pointer; padding: 10px 14px; border-radius: 8px; line-height: 1; z-index: 101; }
  .lb-nav:hover { background: rgba(255,255,255,0.22); }
  .lb-prev { left: 10px; }
  .lb-next { right: 10px; }
  .lb-caption { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.75); font-size: 12px; text-align: center; max-width: 80vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
  @media (max-width: 480px) { .lb-nav { font-size: 24px; padding: 8px 10px; } }

  /* Misc */
  .msg { padding: 40px; text-align: center; color: #aaa; font-size: 14px; }
  .divider { border: none; border-top: 1px solid #eee; margin: 8px 0; }
</style>
</head>
<body>

<div class="container">
  <div class="gallery-header">
    <div class="header-left">
      <button class="btn-back" id="back-btn" style="display:none" onclick="goBack()">← 返回</button>
      <div class="page-title">📁 <span class="folder-name-span" id="folder-name-display">黎明寶庫</span></div>
    </div>
    <button class="btn-copy-link" id="copy-btn" onclick="copyLink()">🔗 分享</button>
  </div>

  <div id="content"><div class="msg">載入中...</div></div>
</div>

<!-- Lightbox -->
<div class="lb-overlay" id="lb-overlay">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-nav lb-prev" onclick="prevImg()">‹</button>
  <img class="lb-img" id="lb-img" src="" alt="">
  <button class="lb-nav lb-next" onclick="nextImg()">›</button>
  <div class="lb-caption" id="lb-caption"></div>
</div>

<script>
  const WORKER_URL = 'https://liminguploader.c3012312.workers.dev';

  const params = new URLSearchParams(location.search);
  let currentFolderId = params.get('folderId');
  const initName = params.get('name') || '黎明寶庫';

  let _images = [];
  let _lbIndex = 0;
  let _touchStartX = 0;

  setFolderName(initName);

  if (!currentFolderId) {
    document.getElementById('content').innerHTML = '<div class="msg">⚠️ 未指定資料夾 ID，請透過正確連結開啟此頁面</div>';
  } else {
    loadGallery(currentFolderId);
  }

  // ── 載入資料 ──────────────────────────────

  async function loadGallery(folderId) {
    document.getElementById('content').innerHTML = '<div class="msg">載入中...</div>';
    try {
      const [fRes, filesRes] = await Promise.all([
        fetch(`${WORKER_URL}/folders?folderId=${folderId}`),
        fetch(`${WORKER_URL}/files?folderId=${folderId}`)
      ]);
      const [fData, filesData] = await Promise.all([fRes.json(), filesRes.json()]);

      const subfolders = (fData.files || []).sort((a, b) => a.name.localeCompare(b.name, 'zh-TW'));
      const files = filesData.files || [];
      const images = files.filter(f => f.mimeType?.startsWith('image/'));
      const videos = files.filter(f => f.mimeType?.startsWith('video/'));
      const docs   = files.filter(f => !f.mimeType?.startsWith('image/') && !f.mimeType?.startsWith('video/'));

      _images = images;

      let html = '';

      if (subfolders.length === 0 && files.length === 0) {
        html = '<div class="msg">這個資料夾沒有內容</div>';
        document.getElementById('content').innerHTML = html;
        return;
      }

      // 子資料夾
      if (subfolders.length > 0) {
        html += `<div class="section-label">資料夾（${subfolders.length}）</div>`;
        html += `<div class="folder-grid">`;
        html += subfolders.map(f => `
          <div class="folder-card" onclick="navigate('${f.id}','${esc(f.name)}')">
            <div class="fc-icon">📁</div>
            <div class="fc-name">${f.name}</div>
          </div>`).join('');
        html += `</div>`;
        if (images.length > 0 || videos.length > 0 || docs.length > 0) html += `<hr class="divider">`;
      }

      // 圖片
      if (images.length > 0) {
        html += `<div class="section-label">圖片（${images.length}）</div>`;
        html += `<div class="media-grid">`;
        html += images.map((f, i) => `
          <div class="media-card" onclick="openLightbox(${i})">
            <img class="media-thumb" src="https://drive.google.com/thumbnail?id=${f.id}&sz=w400" alt="${f.name}" loading="lazy">
            <div class="media-label">${f.name}</div>
          </div>`).join('');
        html += `</div>`;
        if (videos.length > 0 || docs.length > 0) html += `<hr class="divider">`;
      }

      // 影片
      if (videos.length > 0) {
        html += `<div class="section-label">影片（${videos.length}）</div>`;
        html += `<div class="media-grid">`;
        html += videos.map(f => `
          <div class="media-card" onclick="openExternal('https://drive.google.com/file/d/${f.id}/view')">
            <img class="media-thumb" src="https://drive.google.com/thumbnail?id=${f.id}&sz=w400" alt="${f.name}" loading="lazy" onerror="this.style.opacity='0'">
            <div class="play-icon"></div>
            <div class="media-label">${f.name}</div>
          </div>`).join('');
        html += `</div>`;
        if (docs.length > 0) html += `<hr class="divider">`;
      }

      // 文件
      if (docs.length > 0) {
        html += `<div class="section-label">文件（${docs.length}）</div>`;
        html += `<div class="doc-section">`;
        html += docs.map(f => `
          <div class="doc-row">
            <div class="doc-icon">${getIcon(f.mimeType)}</div>
            <div class="doc-info">
              <div class="doc-name">${f.name}</div>
              <div class="doc-meta">${formatSize(f.size)}</div>
            </div>
            <div class="doc-actions">
              <a href="https://drive.google.com/file/d/${f.id}/view" onclick="openExternal(this.href);return false;" class="btn-action">預覽</a>
              <a href="https://drive.google.com/uc?export=download&id=${f.id}" onclick="openExternal(this.href);return false;" class="btn-action">下載</a>
            </div>
          </div>`).join('');
        html += `</div>`;
      }

      document.getElementById('content').innerHTML = html;
    } catch (e) {
      document.getElementById('content').innerHTML = `<div class="msg">載入失敗：${e.message}</div>`;
    }
  }

  // ── 子資料夾導航 ──────────────────────────

  function navigate(id, name) {
    currentFolderId = id;
    setFolderName(name);
    document.getElementById('back-btn').style.display = '';
    history.pushState({ folderId: id, name }, '', `?folderId=${id}&name=${encodeURIComponent(name)}`);
    loadGallery(id);
  }

  function goBack() {
    history.back();
  }

  window.addEventListener('popstate', e => {
    const p = new URLSearchParams(location.search);
    const id = p.get('folderId');
    const name = p.get('name') || '黎明寶庫';
    if (id) {
      currentFolderId = id;
      setFolderName(name);
      document.getElementById('back-btn').style.display = history.state ? '' : 'none';
      loadGallery(id);
    }
  });

  function setFolderName(name) {
    document.getElementById('folder-name-display').textContent = name;
    document.title = name + ' — 黎明寶庫';
  }

  // ── Lightbox ──────────────────────────────

  function openLightbox(i) {
    _lbIndex = i;
    updateLightbox();
    document.getElementById('lb-overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lb-overlay').classList.remove('show');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    const f = _images[_lbIndex];
    document.getElementById('lb-img').src = `https://drive.google.com/thumbnail?id=${f.id}&sz=w1600`;
    document.getElementById('lb-caption').textContent = `${f.name}　${_lbIndex + 1} / ${_images.length}`;
  }

  function prevImg() { _lbIndex = (_lbIndex - 1 + _images.length) % _images.length; updateLightbox(); }
  function nextImg() { _lbIndex = (_lbIndex + 1) % _images.length; updateLightbox(); }

  // 點擊背景關閉
  document.getElementById('lb-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('lb-overlay')) closeLightbox();
  });

  // 鍵盤操作
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lb-overlay').classList.contains('show')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') prevImg();
    if (e.key === 'ArrowRight') nextImg();
  });

  // 觸控滑動
  document.getElementById('lb-overlay').addEventListener('touchstart', e => { _touchStartX = e.touches[0].clientX; }, { passive: true });
  document.getElementById('lb-overlay').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - _touchStartX;
    if (Math.abs(dx) > 50) dx < 0 ? nextImg() : prevImg();
  });

  // ── 複製連結 ──────────────────────────────

  function copyLink() {
    navigator.clipboard.writeText(location.href).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ 已複製';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '🔗 分享'; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ── 外部瀏覽器 ───────────────────────────

  function openExternal(url) {
    if (/Line\//i.test(navigator.userAgent || '')) {
      try {
        const u = new URL(url);
        u.searchParams.set('openExternalBrowser', '1');
        url = u.toString();
      } catch (e) {
        url += (url.includes('?') ? '&' : '?') + 'openExternalBrowser=1';
      }
    }
    window.open(url, '_blank', 'noopener,noreferrer');
  }

  // ── 工具函式 ─────────────────────────────

  function esc(s) { return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

  function getIcon(mime) {
    if (!mime) return '📄';
    if (mime.includes('pdf')) return '📕';
    if (mime.includes('zip') || mime.includes('rar')) return '🗜️';
    if (mime.includes('spreadsheet') || mime.includes('excel')) return '📊';
    if (mime.includes('presentation') || mime.includes('powerpoint')) return '📊';
    if (mime.includes('document') || mime.includes('word')) return '📝';
    if (mime.startsWith('audio/')) return '🎵';
    return '📄';
  }

  function formatSize(bytes) {
    if (!bytes) return '—';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
    return (bytes / 1073741824).toFixed(2) + ' GB';
  }
</script>
</body>
</html>
